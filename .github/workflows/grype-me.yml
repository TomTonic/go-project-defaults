---
# Daily vulnerability scan using grype_me.
#
# Prerequisites:
#   1. Create a GitHub Gist with any initial file at https://gist.github.com
#   2. Create a PAT with 'gist' scope
#   3. Add secret  GIST_TOKEN           = the PAT
#   4. Add variable GRYPE_BADGE_GIST_ID = the gist ID (can reuse the coverage gist)
#
# Badge markdown for your README:
#   [![Vulnerabilities](https://img.shields.io/endpoint?url=https://gist.githubusercontent.com/<USER>/<GIST_ID>/raw/<REPO>-grype.json)](https://gist.github.com/<USER>/<GIST_ID>#file-<REPO>-grype-md)

name: Security Badge

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Check workflow prerequisites
        id: prereq
        shell: bash
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GRYPE_BADGE_GIST_ID: ${{ vars.GRYPE_BADGE_GIST_ID }}
        run: |
          set -euo pipefail
          if [[ -z "$GIST_TOKEN" ]]; then
            echo "GIST_TOKEN is not configured; skipping badge update."
            echo "has_prerequisites=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ -z "$GRYPE_BADGE_GIST_ID" ]]; then
            echo "GRYPE_BADGE_GIST_ID is not configured; skipping badge update."
            echo "has_prerequisites=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_prerequisites=true" >> "$GITHUB_OUTPUT"

      - name: Checkout (with tags)
        if: steps.prereq.outputs.has_prerequisites == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Check for version tags
        if: steps.prereq.outputs.has_prerequisites == 'true'
        id: release_check
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$(git tag -l 'v*' | head -n 1)" ]]; then
            echo "has_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "No version tags found; skipping vulnerability scan."
          echo "has_release=false" >> "$GITHUB_OUTPUT"

      # Don't pin grype_me — the rolling tag updates daily with fresh DB.
      - name: Scan latest release
        if: steps.prereq.outputs.has_prerequisites == 'true' && steps.release_check.outputs.has_release == 'true'
        id: grype
        uses: TomTonic/grype_me@v1
        with:
          scan: latest_release
          description: |
            Daily vulnerability scan of the latest stable release.
          fail-build: false
          gist-token: ${{ secrets.GIST_TOKEN }}
          gist-id: ${{ vars.GRYPE_BADGE_GIST_ID }}
          # TODO: Set the gist-filename to your repo name.
          gist-filename: ${{ github.event.repository.name }}-grype
